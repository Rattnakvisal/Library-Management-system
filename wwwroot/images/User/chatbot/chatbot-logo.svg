<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" role="img" aria-labelledby="chatbotTitle chatbotDesc">
  <title id="chatbotTitle">Library chatbot logo</title>
  <desc id="chatbotDesc">Animated blue robot assistant with floating chat and tool bubbles.</desc>

  <defs>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7cf5ff"/>
      <stop offset="100%" stop-color="#1b66bd"/>
    </linearGradient>
    <linearGradient id="shellGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9eeff"/>
      <stop offset="100%" stop-color="#82c7ff"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a72c3"/>
      <stop offset="100%" stop-color="#193d87"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#95d9ff"/>
      <stop offset="100%" stop-color="#3b8fce"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="35%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#b8ffff"/>
      <stop offset="100%" stop-color="#5de9ff"/>
    </radialGradient>
  </defs>

  <g>
    <g transform="translate(0 0)">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" dur="3.2s" repeatCount="indefinite"/>

      <g transform="translate(66 70)">
        <ellipse cx="64" cy="52" rx="56" ry="43" fill="url(#shellGrad)"/>
        <rect x="23" y="30" width="82" height="40" rx="20" fill="url(#faceGrad)"/>

        <ellipse cx="49" cy="50" rx="7" ry="10" fill="url(#eyeGlow)">
          <animate attributeName="ry" values="10;10;1.5;10;10" keyTimes="0;0.42;0.47;0.52;1" dur="4.8s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="79" cy="50" rx="7" ry="10" fill="url(#eyeGlow)">
          <animate attributeName="ry" values="10;10;1.5;10;10" keyTimes="0;0.46;0.51;0.56;1" dur="4.8s" repeatCount="indefinite"/>
        </ellipse>

        <circle cx="54" cy="45" r="2.2" fill="#d9ffff" opacity="0.9"/>
        <circle cx="84" cy="45" r="2.2" fill="#d9ffff" opacity="0.9"/>

        <path d="M56 62c5 4 11 4 16 0" fill="none" stroke="#7ef8ff" stroke-width="3" stroke-linecap="round">
          <animate attributeName="d" dur="3.2s" repeatCount="indefinite"
            values="M56 62c5 4 11 4 16 0;M56 62c5 5 11 5 16 0;M56 62c5 4 11 4 16 0"/>
        </path>

        <path d="M14 85c-8 3-12 10-8 15c5 6 16 3 21-5" fill="url(#bodyGrad)">
          <animateTransform attributeName="transform" type="rotate" values="-6 20 93;8 20 93;-6 20 93" dur="2.8s" repeatCount="indefinite"/>
        </path>
        <path d="M114 85c8 3 12 10 8 15c-5 6-16 3-21-5" fill="url(#bodyGrad)">
          <animateTransform attributeName="transform" type="rotate" values="6 108 93;-8 108 93;6 108 93" dur="2.8s" repeatCount="indefinite"/>
        </path>

        <ellipse cx="50" cy="108" rx="13" ry="10" fill="url(#bodyGrad)"/>
        <ellipse cx="78" cy="108" rx="13" ry="10" fill="url(#bodyGrad)"/>
        <ellipse cx="64" cy="110" rx="16" ry="15" fill="url(#bodyGrad)"/>
        <circle cx="66" cy="108" r="2.5" fill="#c9ffff" opacity="0.9"/>
        <rect x="61.5" y="118" width="9" height="16" rx="4.5" fill="url(#bubbleGrad)"/>
        <ellipse cx="66" cy="136" rx="7" ry="6.2" fill="url(#bubbleGrad)"/>

        <path d="M102 22l9-17" stroke="#5ee6ff" stroke-width="4" stroke-linecap="round"/>
        <circle cx="112" cy="5" r="4.2" fill="#7ef9ff">
          <animate attributeName="r" values="4.2;5.9;4.2" dur="1.8s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1;0.75;1" dur="1.8s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
  </g>

  <g>
    <g transform="translate(52 56)">
      <animateTransform attributeName="transform" type="translate" values="52 56;52 50;52 56" dur="2.9s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="24" fill="url(#bubbleGrad)"/>
      <rect x="-12" y="-8" width="7" height="7" rx="1.6" fill="#9efcff"/>
      <rect x="-1.5" y="-10" width="7" height="7" rx="1.6" fill="#9efcff"/>
      <rect x="9" y="-8" width="7" height="7" rx="1.6" fill="#9efcff"/>
    </g>

    <g transform="translate(206 68)">
      <animateTransform attributeName="transform" type="translate" values="206 68;206 61;206 68" dur="3.1s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="18" fill="url(#bubbleGrad)"/>
      <path d="M-1 -7v14M-1 13h0" stroke="#9efcff" stroke-width="4" stroke-linecap="round"/>
      <circle cx="-1" cy="14" r="1.8" fill="#9efcff"/>
    </g>

    <g transform="translate(54 170)">
      <animateTransform attributeName="transform" type="translate" values="54 170;54 164;54 170" dur="2.6s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="18" fill="url(#bubbleGrad)"/>
      <path d="M0 -10l2.4 2.2l3.4-1l1.3 3.1l3.2 1.1l-1 3.3l2.2 2.3l-2.2 2.3l1 3.3l-3.2 1.1l-1.3 3.1l-3.4-1l-2.4 2.2l-2.5-2.2l-3.4 1l-1.2-3.1l-3.3-1.1l1-3.3l-2.1-2.3l2.1-2.3l-1-3.3l3.3-1.1l1.2-3.1l3.4 1z"
        fill="#9efcff"/>
      <circle cx="0" cy="0" r="4.8" fill="#2e86c4"/>
    </g>

    <g transform="translate(202 174)">
      <animateTransform attributeName="transform" type="translate" values="202 174;202 168;202 174" dur="3s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="17" fill="url(#bubbleGrad)"/>
      <path d="M-8 2c2-6 5-6 8-3c3-2 5-1 6 3c-2 6-5 6-8 3c-3 2-5 1-6-3Z" fill="#9efcff"/>
    </g>
  </g>
</svg>
